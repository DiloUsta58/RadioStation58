<!DOCTYPE html>
<html lang="tr">
<head>

    <title>Çevrimdışı - Radio Dinle</title>
    <style>

        button { background: #4A90E2; border: none; color: white; padding: 12px 24px; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 20px; }

<body>
    <div class="icon">📻</div>

</html>
